 <!DOCTYPE html>
<html>
<head>
    <title>Product Dashboard</title>
    <link rel="stylesheet" href="task7.css">
</head>
<body>

<!--  Navbar -->
<nav class="navbar">
  <h2 class="logo">MyShop</h2>

  <div class="nav-buttons">
    <button onclick="goHome()"> Home</button>
    <button onclick="toggleDark()">🌙</button>
  </div>
</nav>

<!--  Search + Sort -->
<div class="top-controls">
  <input type="text" id="search" placeholder="Search products..." />
  
  <button onclick="sortLowToHigh()">⬇ Price</button>
  <button onclick="sortHighToLow()">⬆ Price</button>
</div>

<!--  Category Filter -->
<div class="controls">
  <select id="category" onchange="filterCategory()">
    <option value="all">All</option>
    <option value="electronics">Electronics</option>
    <option value="jewelery">Jewelery</option>
    <option value="men's clothing">Men</option>
    <option value="women's clothing">Women</option>
  </select>
</div>

<!--  Loader -->
<p id="loader">Loading...</p>

<!--  Error -->
<p id="error"></p>

<!--  Products -->
<div id="products"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">&times;</span>
    <div id="modalData"></div>
  </div>
</div>

<script src="task7.js"></script>

</body>
</html>
